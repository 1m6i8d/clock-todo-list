{% extends "base.html" %}
{% block title %}Edit Task - Clock{% endblock %}
{% block content %}
  <header class="page-header">
    <h1>Edit Task</h1>
  </header>
  <form class="form-card" method="post" action="{{ url_for('pages.edit_task', task_id=task.id) }}">
    <label>
      Title
      <input type="text" name="title" value="{{ task.title }}" required>
    </label>
    <label>
      Category
      <select name="category">
        {% for cat in ['Health', 'Work', 'Home', 'Personal'] %}
        <option {{ 'selected' if task.category == cat }}>{{ cat }}</option>
        {% endfor %}
      </select>
    </label>
    <label>
      Start time
      <input type="time" name="start" value="{{ start_str }}" required>
    </label>
    <label>
      End time
      <input type="time" name="end" value="{{ end_str }}" required>
    </label>
    <button type="submit" class="btn">Save changes</button>
  </form>
  <form method="post" action="{{ url_for('pages.delete_task', task_id=task.id) }}" style="margin-top: 16px;">
    <button type="submit" class="btn btn-danger" onclick="return confirm('Delete this task?');">Delete task</button>
  </form>
{% endblock %}
