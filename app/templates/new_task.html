{% extends "base.html" %}
{% block title %}New Task - Clock{% endblock %}
{% block content %}
  <header class="page-header">
    <h1>New Task</h1>
  </header>
  <form class="form-card" method="post" action="{{ url_for('pages.new_task') }}">
    <label>
      Title
      <input type="text" name="title" placeholder="e.g. Morning run" required>
    </label>
    <label>
      Category
      <select name="category">
        <option>Health</option>
        <option>Work</option>
        <option>Home</option>
        <option>Personal</option>
      </select>
    </label>
    <label>
      Start time
      <input type="time" name="start" required>
    </label>
    <label>
      End time
      <input type="time" name="end" required>
    </label>
    <button type="submit" class="btn">Save task</button>
  </form>
{% endblock %}
