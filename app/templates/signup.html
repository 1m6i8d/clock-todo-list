{% extends "base.html" %}
{% block title %}Sign up - Clock{% endblock %}
{% block layout %}
  <div class="auth-shell">
    <div class="auth-brand">Clock</div>
    <div class="auth-card">
      <h1>Create your account</h1>
      <form method="post" action="#" style="display:flex; flex-direction:column; gap:14px;">
        <label>
          Name
          <input type="text" name="name" placeholder="Your name">
        </label>
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com">
        </label>
        <label>
          Password
          <input type="password" name="password" placeholder="••••••••">
        </label>
        <button type="submit" class="btn">Sign up</button>
      </form>
    </div>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('pages.login') }}">Log in</a></p>
    <p class="hint">Auth isn't wired up yet — this is a placeholder form.</p>
  </div>
{% endblock %}
