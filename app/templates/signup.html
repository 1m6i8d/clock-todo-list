{% extends "base.html" %}
{% from "_auth_form.html" import auth_fields %}
{% block title %}Sign up - Clock{% endblock %}
{% block layout %}
  <div class="auth-shell">
    <div class="auth-brand">Clock</div>
    <div class="auth-card">
      <h1>Create your account</h1>
      {% include "_flashes.html" %}
      <form method="post" action="{{ url_for('pages.signup') }}" class="auth-form">
        {{ auth_fields('signup') }}
        <button type="submit" class="btn">Sign up</button>
      </form>
    </div>
    <p class="auth-switch">Already have an account? <a href="{{ url_for('pages.login') }}">Log in</a></p>
  </div>
{% endblock %}
