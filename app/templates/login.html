{% extends "base.html" %}
{% from "_auth_form.html" import auth_fields %}
{% block title %}Log in - Clock{% endblock %}
{% block layout %}
  <div class="auth-shell">
    <div class="auth-brand">Clock</div>
    <div class="auth-card">
      <h1>Log in</h1>
      <form method="post" action="#" class="auth-form">
        {{ auth_fields('login') }}
        <button type="submit" class="btn">Log in</button>
      </form>
    </div>
    <p class="auth-switch">New here? <a href="{{ url_for('pages.signup') }}">Create an account</a></p>
    <p class="hint">Auth isn't wired up yet — this is a placeholder form.</p>
  </div>
{% endblock %}
